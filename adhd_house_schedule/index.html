<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bobby's Weekly Rhythm</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="brand">
        <span class="brand-mark"></span>
        <span class="brand-name">Home Rhythm</span>
      </div>
      <div class="topbar-actions">
        <button id="prevDayBtn" class="icon-btn" aria-label="Previous day">&#10094;</button>
        <button id="datePickerBtn" class="date-picker-btn" aria-haspopup="true" aria-expanded="false">
          <span id="datePickerLabel">Loading...</span>
          <span class="caret">&#9662;</span>
        </button>
        <button id="nextDayBtn" class="icon-btn" aria-label="Next day">&#10095;</button>
        <button id="todayBtn" class="ghost-btn">Today</button>
      </div>

      <div id="calendarPopover" class="calendar-popover" hidden>
        <div class="calendar-header">
          <button id="prevMonthBtn" class="icon-btn" aria-label="Previous month">&#10094;</button>
          <h2 id="monthLabel">Month Year</h2>
          <button id="nextMonthBtn" class="icon-btn" aria-label="Next month">&#10095;</button>
        </div>
        <div class="weekday-row" id="weekdayRow"></div>
        <div class="calendar-grid" id="calendarGrid"></div>
      </div>
    </header>

    <main class="task-view">
      <div class="task-view-inner">
        <section class="day-hero">
          <p class="eyebrow" id="viewModeLabel">Today</p>
          <h1 id="selectedDateLabel">Loading...</h1>
          <div class="day-hero-meta">
            <span id="focusBadge" class="focus-badge">Loading...</span>
            <p id="dayPurpose" class="hero-purpose"></p>
          </div>
        </section>

        <section class="tasks-section">
          <div class="section-head">
            <h2>Tasks</h2>
            <span id="taskCount" class="task-count"></span>
          </div>
          <ul id="taskList" class="task-list"></ul>
        </section>

        <section id="extrasSection" class="extras-section" hidden>
          <div class="section-head">
            <h2>Just for you</h2>
            <span class="section-tag">instead of scrolling</span>
          </div>
          <ul id="extrasList" class="task-list extras-list"></ul>
        </section>

        <section class="rotation-section">
          <div class="section-head">
            <h2>House project rotation</h2>
          </div>
          <div id="rotationCard" class="rotation-card"></div>
        </section>

        <p id="selectedDateMeta" class="footnote"></p>
      </div>
    </main>
  </div>

  <script id="scheduleData" type="application/json">
{
  "title": "Bobby's Home + Walk Calendar",
  "weekdayOrder": ["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"],
  "dailyTemplates": {
    "0": {
      "label": "Master Bath + Background Rooms",
      "purpose": "Slow Sunday pace: knock out the master bath on your own time and vacuum the two background rooms. Still plenty of room to rest.",
      "tasks": [
        "Master bath: toilet, sink, mirror, shower, then vacuum and mop the floor.",
        "Vacuum the office.",
        "Vacuum the spare room."
      ]
    },
    "1": {
      "label": "Reset Day",
      "purpose": "Start the week by getting the house back to neutral so nothing feels chaotic.",
      "tasks": [
        "Walk at the park before going home from work.",
        "Pick up clutter.",
        "Take out trash.",
        "Do dishes or reset the sink and counters.",
        "Quick straighten-up pass through the house."
      ]
    },
    "2": {
      "label": "Dusting Day",
      "purpose": "Knock out the dust in one full pass so the house feels cleaner fast.",
      "tasks": [
        "Walk at the park before going home from work.",
        "Dust the whole house in one go.",
        "Hit furniture, picture frames, shelves, surfaces, and obvious dusty spots."
      ]
    },
    "3": {
      "label": "Baseboards Day",
      "purpose": "Handle the detail grime in one pass and keep the house from feeling grimy around the edges.",
      "tasks": [
        "Walk at the park before going home from work.",
        "Do all baseboards in one go.",
        "Optional: catch trim, corners, or window sills if you still have gas in the tank."
      ]
    },
    "4": {
      "label": "Main Floors",
      "purpose": "Tackle the main living-zone floors plus the hallway in one pass before they get nasty.",
      "tasks": [
        "Walk at the park before going home from work.",
        "Vacuum living room, kitchen, and hallway.",
        "Mop living room, kitchen, and hallway."
      ]
    },
    "5": {
      "label": "Main Bath",
      "purpose": "End the week with just the main bathroom. One small room, one focused pass, then you're done.",
      "tasks": [
        "Walk at the park before going home from work.",
        "Main bath: toilet, sink, mirror, tub, then vacuum and mop the floor."
      ]
    },
    "6": {
      "label": "Laundry + Bedroom Floors + House Project",
      "purpose": "Saturday is the main progress day: finish laundry completely, knock out the remaining floors, and do one house project.",
      "tasks": [
        "Laundry all in one go: wash, dry, fold, and put away immediately.",
        "Vacuum bedroom and laundry room.",
        "Mop bedroom and laundry room.",
        "Do one house project from the current rotation."
      ]
    }
  },
  "recurringExtras": [
    { "cadence": "everyOtherDay", "parity": "even", "task": "Walk Precious." },
    { "cadence": "everyOtherDay", "parity": "even", "task": "Listen to a chapter of your Audible book." },
    { "cadence": "everyOtherDay", "parity": "odd",  "task": "Watch an educational / self-growth video (instead of TV or scrolling)." }
  ],
  "rotatingSaturdayProjects": [
    {
      "title": "Seal cracks or windows",
      "details": "Silicone one window, crack area, or other sealing spot around the house."
    },
    {
      "title": "Landscaping cleanup",
      "details": "Pull weeds, clean a bed, trim an area, or tidy up an outside section."
    },
    {
      "title": "Plant or improve a bed",
      "details": "Plant something, edge an area, or make one visible improvement outside."
    },
    {
      "title": "Maintenance checkpoint",
      "details": "Walk the house, inspect problem spots, and finish one repair or maintenance item."
    }
  ]
}
  </script>
  <script src="app.js"></script>
</body>
</html>
