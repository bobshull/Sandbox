name: Pulse
options:
  bundleIdPrefix: com.bobshull.pulse
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: "Bob Shull"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "16.0"
    TARGETED_DEVICE_FAMILY: "1,2"
    SUPPORTS_MACCATALYST: false
    ENABLE_PREVIEWS: NO

targets:
  Pulse:
    type: application
    platform: iOS
    sources:
      - path: Pulse
        excludes:
          - "Resources/Info.plist"
    resources:
      - Pulse/Resources
    info:
      path: Pulse/Resources/Info.plist
      properties:
        CFBundleDisplayName: Pulse
        UILaunchScreen:
          UIColorName: LaunchBackground
          UIImageName: PulseMark
          UIImageRespectsSafeAreaLayoutGuide: false
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
          UISceneConfigurations:
            UIWindowSceneSessionRoleApplication:
              - UISceneConfigurationName: Default Configuration
                UISceneDelegateClassName: $(PRODUCT_MODULE_NAME).SceneDelegate
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIRequiresFullScreen: true
        UIRequiredDeviceCapabilities:
          - armv7
        UIBackgroundModes:
          - audio
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.bobbyshull.pulse
        INFOPLIST_FILE: Pulse/Resources/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: ""
